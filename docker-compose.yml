 services:
    db:
      image: postgres:16
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: postgres
      volumes:
        - pgdata:/var/lib/postgresql/data

    api:
      build: .
      environment:
        DATABASE_CONNECTION: postgresql://postgres:postgres@db:5432/postgres
      depends_on:
        - db
      ports:
        - "8000:8000"

  volumes:
    pgdata: